---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: functionaccessrules.fission.io
spec:
  group: fission.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - targetFunction
              properties:
                targetFunction:
                  type: object
                  description: "Target function selector. Use 'name' for name/pattern/regex matching, 'matchLabels'/'matchExpressions' for label-based selection. Patterns: exact name, glob (prefix*), or regex (/pattern/)."
                  properties:
                    name:
                      type: string
                      nullable: true
                      description: "Function name, glob pattern (* or prefix*), or regex (/pattern/)"
                    matchLabels:
                      type: object
                      nullable: true
                      description: "Select functions by label key-value pairs (AND logic)"
                      additionalProperties:
                        type: string
                    matchExpressions:
                      type: array
                      nullable: true
                      description: "Select functions by label expressions"
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          values:
                            type: array
                            items:
                              type: string

                from:
                  type: array
                  default: []
                  description: "List of allowed sources (NetworkPolicy-style peer)"
                  items:
                    type: object
                    properties:
                      ipBlock:
                        type: object
                        nullable: true
                        properties:
                          cidr:
                            type: string
                          except:
                            type: array
                            default: []
                            items:
                              type: string
                      namespaceSelector:
                        type: object
                        nullable: true
                        properties:
                          name:
                            type: string
                            nullable: true
                          matchLabels:
                            type: object
                            nullable: true
                            additionalProperties:
                              type: string
                          matchExpressions:
                            type: array
                            nullable: true
                            items:
                              type: object
                              properties:
                                key:
                                  type: string
                                operator:
                                  type: string
                                values:
                                  type: array
                                  items:
                                    type: string
                      podSelector:
                        type: object
                        nullable: true
                        properties:
                          matchLabels:
                            type: object
                            nullable: true
                            additionalProperties:
                              type: string
                          matchExpressions:
                            type: array
                            nullable: true
                            items:
                              type: object
                              properties:
                                key:
                                  type: string
                                operator:
                                  type: string
                                values:
                                  type: array
                                  items:
                                    type: string

  scope: Namespaced
  names:
    plural: functionaccessrules
    singular: functionaccessrule
    kind: FunctionAccessRule
    shortNames:
      - far
      - funcaccess
